<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumaAgent</title>
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="container">
    <div class="header-content">
      <h1 class="title">LumaAgent</h1>
      <p class="subtitle">Build something amazing — just start typing below</p>
    </div>

    <div id="chat-messages" class="chat-messages-container"></div>

    <div class="input-container">
      <div class="chat-input-box">
        <button class="icon-btn" title="Attach File">
          <i data-lucide="paperclip"></i>
        </button>
        <textarea id="chat-textarea" placeholder="Message LumaAgent..."></textarea>
        <button class="icon-btn send-btn" title="Send Message">
          <i data-lucide="arrow-up"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
